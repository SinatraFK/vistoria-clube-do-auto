<!-- ✅ PATCH V5.2 (Topo mobile sem arrasto)
1) Troque o CSS do topo pelo bloco abaixo (substitua o seu .topbar/.topbarLeft/.topbarRight).
2) Troque o HTML do topo (div.topbar...) pelo bloco abaixo.
Não mexe em nada do Firebase/relatório. -->

<style>
html,body{max-width:100%;overflow-x:hidden}

/* ===== TOPBAR (V5.2 - ajuste mobile seguro) ===== */
.topbar{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:14px;
  align-items:start;
  background:#111827;
  color:#fff;
  padding:12px;
  border-radius:14px;
  box-shadow:0 8px 22px rgba(0,0,0,.18);
  margin-bottom:12px;
}
.topbarLeft{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
.topbar img{width:150px;height:auto;display:block}
.topbarBtns{
  display:flex;
  flex-direction:column;
  gap:8px;
  width:100%;
  align-items:center;
}
.topbarBtns .btnSmall{
  width:100%;
  max-width:220px;
}
.topbarTitle{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0;align-self:start}
.topbarTitle .main{font-weight:900;letter-spacing:.5px;font-size:18px}
.userline{display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:12px;opacity:.95}
.chip{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.08);max-width:100%}
.dot{width:10px;height:10px;border-radius:50%;background:#2e7d32}
.btnSmall{border:none;border-radius:10px;padding:9px 11px;font-weight:900;cursor:pointer}
.btnExit{background:#16a34a;color:#fff}
.btnExit:hover{background:#22c55e}
.btnGhost{background:rgba(255,255,255,.08);color:#fff}
.btnGhost:hover{background:rgba(255,255,255,.14)}

@media (max-width:760px){
  .topbar{
    grid-template-columns:1fr;
    justify-items:center;
    text-align:center;
  }
  .topbarTitle{align-items:center}
  .userline{justify-content:center}
  .topbarLeft{width:100%}
  .topbarBtns .btnSmall{max-width:280px}
}
</style>

<!-- Troque seu topo por este -->
<div class="topbar">
  <div class="topbarLeft">
    <img id="logoTop" alt="Logo">
    <div class="topbarBtns">
      <button class="btnSmall btnGhost" id="btnSwitchUser">Trocar usuário</button>
      <button class="btnSmall btnExit" id="btnLogout">Sair</button>
    </div>
  </div>

  <div class="topbarTitle">
    <div class="main">AVALIAÇÃO COMERCIAL</div>
    <div class="userline">
      <span class="chip"><span class="dot" id="dot"></span><span id="statusTxt">APROVADO</span></span>
      <span class="chip" id="whoami">—</span>
      <span class="chip"><span id="roleTxt">consultor</span></span>
    </div>
  </div>
</div>
